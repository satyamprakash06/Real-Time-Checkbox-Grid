<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>1 Million CheckBox</title>
    <style>
        :root {
            color-scheme: dark;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #0f172a, #111827);
            color: #f8fafc;
            padding: 24px;
        }

        .card {
            width: min(900px, 100%);
            background: rgba(15, 23, 42, 0.82);
            border: 1px solid rgba(148, 163, 184, 0.2);
            border-radius: 20px;
            padding: 28px;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.35);
            backdrop-filter: blur(14px);
        }

        h1 {
            margin: 0 0 12px;
            font-size: 2rem;
            letter-spacing: 0.04em;
        }

        p {
            margin: 0 0 18px;
            color: #cbd5e1;
        }

        #container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(26px, 1fr));
            gap: 10px;
            padding: 14px;
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.6);
            border: 1px solid rgba(148, 163, 184, 0.15);
        }

        input[type="checkbox"] {
            width: 22px;
            height: 22px;
            cursor: pointer;
            accent-color: #38bdf8;
            transform: scale(1.02);
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>CheckBox Gallery</h1>
        <p>Interactive checkboxes with a polished dark theme.</p>
        <div id="container"></div>
    </div>
        <script src="/socket.io/socket.io.js"></script>
      <script>
        const socket = io();
        const container = document.getElementById('container');
        const CHECKBOX_COUNT = 200;


          socket.on('server:checkbox:change', (data)=>{
                console.log(`Socket Server Event`, data);
                const { index, isChecked } = data;

                const input = document.getElementById(`checkbox-${index}`);
                if(input){
                    input.checked = isChecked;
                }
            });

            window.addEventListener('load', async ()=>{
                
                    const response = await fetch('/checkboxes', { method: 'GET' });
                    const data = await response.json();

                    if(data && data.checkboxes){
                    data.checkboxes.forEach((serverValue, index)=>{
                        const input = document.createElement('input');
                        input.type = 'checkbox';
                        input.id = `checkbox-${index}`;
                        input.checked = serverValue;
                         input.addEventListener('change', (event) => {
                        const isChecked = event.target.checked;
                         console.log(`Checkbox ${index + 1} is ${isChecked ? 'checked' : 'unchecked'}`);
                        socket.emit('client:checkbox:change',{index, isChecked});
                             });
                            container.appendChild(input); 
                        });
                    }
            });


      </script>
</body>
</html>
